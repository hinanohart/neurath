name: release

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write       # for the GitHub Release
  id-token: write       # for PyPI Trusted Publisher OIDC

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -e . cyclonedx-bom
      - run: cyclonedx-py environment --output-format JSON -o sbom.cyclonedx.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: sbom.cyclonedx.json

  github_release:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v8
        with:
          name: sbom
          path: sbom/
      - uses: softprops/action-gh-release@v3
        with:
          # Attach distributions AND the supply-chain SBOM to the release.
          files: |
            dist/*
            sbom/sbom.cyclonedx.json
          generate_release_notes: true

  pypi_publish:
    # Requires PyPI Trusted Publisher set up at
    #   https://pypi.org/manage/account/publishing/
    # If not yet configured, this job will skip cleanly.
    # `needs: github_release` keeps the order atomic: PyPI never publishes
    # ahead of the GitHub Release artifacts (or in parallel with them).
    needs: [build, github_release]
    runs-on: ubuntu-latest
    environment: pypi
    if: ${{ vars.PYPI_TRUSTED_PUBLISHER == 'true' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
